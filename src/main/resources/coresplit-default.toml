# ═══════════════════════════════════════
#        CoreSplit Configuration
# ═══════════════════════════════════════

[dimension]
# Enable per-dimension threading.
# Each dimension (Overworld, Nether, End, etc.) runs on its own thread.
enabled = true
# Number of dimension worker threads. 0 = auto-detect (= max(3, CPU/2)).
thread_count = 0

[entity]
# Enable parallel entity processing within each dimension.
# Entities are partitioned by spatial region and processed concurrently.
enabled = true
# Number of entity worker threads. 0 = auto-detect (= max(2, CPU/2)).
worker_count = 0
# Spatial partition granularity. 2^partition_shift chunks per partition.
# Higher value = fewer, larger partitions = less overhead but less parallelism.
partition_shift = 4

[chunk]
# Enable priority-based parallel chunk loading.
# Chunks near players load first, distant chunks are background-loaded.
enabled = true
# Number of chunk loading threads. 0 = auto-detect.
worker_count = 0
# Radius (in chunks) around players for high-priority loading.
priority_radius = 8
# Maximum chunks kept in memory. Reduce for lower RAM usage.
max_in_memory = 2048

[pipeline]
# Enable the phased tick pipeline.
# Splits each dimension's tick into ordered phases for finer optimization.
enabled = true
# Timeout (ms) for each phase. Prevents a single dimension from blocking everything.
phase_timeout_ms = 5000

[monitoring]
# Enable performance monitoring and /coresplit commands.
enabled = true
# Log per-tick metrics (verbose, for debugging only).
log_per_tick = false

# ─── TNT 爆炸并行计算 ───
[explosion]
# 并行处理 TNT 爆炸的射线投射计算。
# 大量 TNT 同时爆炸时可降低 60-75% 的 Tick 耗时。
enabled = true
# 爆炸计算线程数。0 = auto-detect (= min(CPU/2, 4))。
thread_count = 0

# ─── 网络同步 ───
[network]
# 向客户端推送性能指标（用于 F3 面板显示）。
# 每秒 1 次，单个数据包约 200 字节，对带宽影响极小。
metrics_enabled = true

# ─── 客户端 ───
[client]
# 在 F3 调试屏幕左侧显示 CoreSplit 运行状态。
f3_overlay = true